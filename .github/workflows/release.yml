# Requires Xcode 26.2+ (macOS 26.2 deployment target).
# GitHub-hosted runners may not have Xcode 26.2 yet.
# To use a self-hosted runner, change runs-on to: self-hosted
# and ensure Xcode 26.2 is installed on your Mac.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: self-hosted

    env:
      SCHEME: "ToDo List"
      PROJECT: "ToDo List.xcodeproj"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # List available Xcode versions
          ls /Applications/ | grep Xcode
          # Select the latest available Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      - name: Build
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ToDo List.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          mkdir -p "$RUNNER_TEMP/export"
          cp -R "$RUNNER_TEMP/ToDo List.xcarchive/Products/Applications/ToDo List.app" "$RUNNER_TEMP/export/"

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "ToDo List" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "ToDo List.app" 150 185 \
            --app-drop-link 450 185 \
            "$RUNNER_TEMP/ToDo-List-${{ github.ref_name }}.dmg" \
            "$RUNNER_TEMP/export/" || true

          # Fallback to zip if DMG creation fails
          if [ ! -f "$RUNNER_TEMP/ToDo-List-${{ github.ref_name }}.dmg" ]; then
            cd "$RUNNER_TEMP/export"
            zip -r "$RUNNER_TEMP/ToDo-List-${{ github.ref_name }}.zip" "ToDo List.app"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ runner.temp }}/ToDo-List-${{ github.ref_name }}.dmg
            ${{ runner.temp }}/ToDo-List-${{ github.ref_name }}.zip
