# Requires Xcode 26.2+ (macOS 26.2 deployment target).
# Uses a self-hosted runner with Xcode 26.2 installed.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: write

    env:
      SCHEME: "ToDo List"
      PROJECT: "ToDo List.xcodeproj"
      TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ToDo List.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package
        run: |
          APP_DIR="$RUNNER_TEMP/ToDo List.xcarchive/Products/Applications"
          mkdir -p "$RUNNER_TEMP/export"
          cp -R "$APP_DIR/ToDo List.app" "$RUNNER_TEMP/export/"

          # Create ZIP
          cd "$RUNNER_TEMP/export"
          zip -r "$RUNNER_TEMP/ToDo-List-${TAG}.zip" "ToDo List.app"

          # Try DMG (optional)
          if command -v create-dmg &> /dev/null; then
            create-dmg \
              --volname "ToDo List" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "ToDo List.app" 150 185 \
              --app-drop-link 450 185 \
              "$RUNNER_TEMP/ToDo-List-${TAG}.dmg" \
              "$RUNNER_TEMP/export/" || true
          fi

          echo "--- Output files ---"
          ls -la "$RUNNER_TEMP"/ToDo-List-${TAG}.*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ${{ runner.temp }}/ToDo-List-${{ github.ref_name }}.zip
            ${{ runner.temp }}/ToDo-List-${{ github.ref_name }}.dmg
